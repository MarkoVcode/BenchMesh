<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a1a" stroke="#3b82f6" stroke-width="2"/>

  <!-- Oscilloscope/Meter display screen (top) -->
  <rect x="16" y="16" width="32" height="18" rx="2" fill="#0a0a0a" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Waveform in display -->
  <path d="M 18 25 Q 22 22, 26 25 T 34 25 Q 38 28, 42 25 T 46 25"
        fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Grid dots in display -->
  <circle cx="20" cy="25" r="0.5" fill="#3b82f644"/>
  <circle cx="24" cy="25" r="0.5" fill="#3b82f644"/>
  <circle cx="28" cy="25" r="0.5" fill="#3b82f644"/>
  <circle cx="32" cy="25" r="0.5" fill="#3b82f644"/>
  <circle cx="36" cy="25" r="0.5" fill="#3b82f644"/>
  <circle cx="40" cy="25" r="0.5" fill="#3b82f644"/>
  <circle cx="44" cy="25" r="0.5" fill="#3b82f644"/>

  <!-- Control knobs/buttons (bottom) -->
  <circle cx="22" cy="44" r="4" fill="#0a0a0a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="32" cy="44" r="4" fill="#0a0a0a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="42" cy="44" r="4" fill="#0a0a0a" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Knob indicators -->
  <line x1="22" y1="44" x2="22" y2="41" stroke="#10b981" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="34" y2="42" stroke="#10b981" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="44" x2="44" y2="46" stroke="#10b981" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Power LED indicator -->
  <circle cx="54" cy="20" r="2" fill="#10b981" opacity="0.8"/>
  <circle cx="54" cy="20" r="3" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
</svg>
