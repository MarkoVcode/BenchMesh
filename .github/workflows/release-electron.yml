name: Release BenchMesh App

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allows manual trigger

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: |
          cd benchmesh-serial-service/frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd benchmesh-serial-service/frontend
          npm run test -- --run

      - name: Build frontend
        run: |
          cd benchmesh-serial-service/frontend
          npm run build

      - name: Install backend dependencies
        run: |
          cd benchmesh-serial-service
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: |
          cd benchmesh-serial-service
          python -m pytest -v

  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  create-release:
    needs: [run-tests, get-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE=""
          if [[ "${{ needs.get-version.outputs.version }}" == *"alpha"* ]] || \
             [[ "${{ needs.get-version.outputs.version }}" == *"beta"* ]] || \
             [[ "${{ needs.get-version.outputs.version }}" == *"rc"* ]]; then
            PRERELEASE="--prerelease"
          fi

          gh release create ${{ github.ref_name }} \
            --title "BenchMesh ${{ needs.get-version.outputs.version }}" \
            $PRERELEASE \
            --notes "## BenchMesh Release ${{ needs.get-version.outputs.version }}

          ### Downloads

          #### Electron Desktop Applications
          - **Linux**: AppImage (portable) or .deb (Debian/Ubuntu installer)
          - **Windows**: .exe installer or portable
          - **macOS**: .dmg (drag-and-drop) or .zip

          #### Self-Hosted Web Application
          - Download \`benchmesh-web-${{ needs.get-version.outputs.version }}.tar.gz\`
          - Extract and run \`./start.sh\`

          ### Installation

          **Electron App:**
          - Linux: \`chmod +x BenchMesh-*.AppImage && ./BenchMesh-*.AppImage\`
          - Windows: Run the installer or portable .exe
          - macOS: Open .dmg and drag to Applications

          **Self-Hosted:**
          \`\`\`bash
          tar -xzf benchmesh-web-*.tar.gz
          cd benchmesh
          npm install
          cd benchmesh-serial-service && pip install -r requirements.txt
          cd .. && ./start.sh
          \`\`\`

          ### What's New
          See [CHANGELOG.md](CHANGELOG.md) for details.

          ### Requirements
          - Python 3.8+
          - Node.js 18+ (development only for self-hosted)
          - Serial port access for instrument communication"

  build-linux:
    needs: [create-release, get-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0

      - name: Install Node dependencies
        run: |
          npm install
          cd benchmesh-serial-service/frontend
          npm ci
          cd ../..

      - name: Ensure .node-red directory exists
        run: |
          mkdir -p .node-red
          echo '{}' > .node-red/.config.nodes.json
          echo '{}' > .node-red/.config.runtime.json

      - name: Build frontend
        run: |
          cd benchmesh-serial-service/frontend
          npm run build
          cd ../..

      - name: Install Electron dependencies
        run: |
          cd electron
          npm install

      - name: Update version in electron package.json
        run: |
          cd electron
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TARGET_VERSION="${{ needs.get-version.outputs.version }}"
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            npm version $TARGET_VERSION --no-git-tag-version --allow-same-version
          else
            echo "Version already set to $TARGET_VERSION, skipping"
          fi

      - name: Build Electron app (Linux)
        run: |
          cd electron
          npm run build:linux

      - name: Upload Linux Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            ./dist/BenchMesh-${{ needs.get-version.outputs.version }}.AppImage#BenchMesh-${{ needs.get-version.outputs.version }}-Linux-x86_64.AppImage \
            ./dist/benchmesh-electron_${{ needs.get-version.outputs.version }}_amd64.deb#BenchMesh-${{ needs.get-version.outputs.version }}-amd64.deb

  build-windows:
    needs: [create-release, get-version]
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: |
          npm install
          cd benchmesh-serial-service/frontend
          npm ci
          cd ../..

      - name: Ensure .node-red directory exists
        run: |
          mkdir -p .node-red
          echo '{}' > .node-red/.config.nodes.json
          echo '{}' > .node-red/.config.runtime.json
        shell: bash

      - name: Build frontend
        run: |
          cd benchmesh-serial-service/frontend
          npm run build
          cd ../..

      - name: Install Electron dependencies
        run: |
          cd electron
          npm install

      - name: Update version in electron package.json
        run: |
          cd electron
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TARGET_VERSION="${{ needs.get-version.outputs.version }}"
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            npm version $TARGET_VERSION --no-git-tag-version --allow-same-version
          else
            echo "Version already set to $TARGET_VERSION, skipping"
          fi

      - name: Build Electron app (Windows)
        run: |
          cd electron
          npm run build:win

      - name: Upload Windows Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload ${{ github.ref_name }} \
            "./dist/BenchMesh Setup ${{ needs.get-version.outputs.version }}.exe#BenchMesh-Setup-${{ needs.get-version.outputs.version }}.exe" \
            "./dist/BenchMesh ${{ needs.get-version.outputs.version }}.exe#BenchMesh-Portable-${{ needs.get-version.outputs.version }}.exe"

  build-macos:
    needs: [create-release, get-version]
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: |
          npm install
          cd benchmesh-serial-service/frontend
          npm ci
          cd ../..

      - name: Ensure .node-red directory exists
        run: |
          mkdir -p .node-red
          echo '{}' > .node-red/.config.nodes.json
          echo '{}' > .node-red/.config.runtime.json

      - name: Build frontend
        run: |
          cd benchmesh-serial-service/frontend
          npm run build
          cd ../..

      - name: Install Electron dependencies
        run: |
          cd electron
          npm install

      - name: Update version in electron package.json
        run: |
          cd electron
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TARGET_VERSION="${{ needs.get-version.outputs.version }}"
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            npm version $TARGET_VERSION --no-git-tag-version --allow-same-version
          else
            echo "Version already set to $TARGET_VERSION, skipping"
          fi

      - name: Build Electron app (macOS)
        run: |
          cd electron
          npm run build:mac

      - name: Upload macOS Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            ./dist/BenchMesh-${{ needs.get-version.outputs.version }}.dmg#BenchMesh-${{ needs.get-version.outputs.version }}-macOS.dmg \
            ./dist/BenchMesh-${{ needs.get-version.outputs.version }}-mac.zip#BenchMesh-${{ needs.get-version.outputs.version }}-macOS.zip

  build-self-hosted:
    needs: [create-release, get-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend
        run: |
          cd benchmesh-serial-service/frontend
          npm ci
          npm run build
          cd ../..

      - name: Create self-hosted archive
        run: |
          # Create distribution directory
          mkdir -p dist-web/benchmesh

          # Copy necessary files
          cp -r benchmesh-serial-service dist-web/benchmesh/
          # Copy .node-red if it exists (created on first run)
          if [ -d .node-red ]; then
            cp -r .node-red dist-web/benchmesh/
          fi
          cp start.sh dist-web/benchmesh/
          cp package.json dist-web/benchmesh/
          cp package-lock.json dist-web/benchmesh/
          cp README.md dist-web/benchmesh/
          cp STARTUP.md dist-web/benchmesh/
          cp DISTRIBUTION.md dist-web/benchmesh/

          # Create installation script
          cat > dist-web/benchmesh/install.sh << 'EOF'
          #!/bin/bash
          echo "Installing BenchMesh dependencies..."
          npm install
          cd benchmesh-serial-service
          pip3 install -r requirements.txt
          cd ..
          echo ""
          echo "Installation complete!"
          echo "Run ./start.sh to start BenchMesh"
          EOF
          chmod +x dist-web/benchmesh/install.sh

          # Create archive
          cd dist-web
          tar -czf benchmesh-web-${{ needs.get-version.outputs.version }}.tar.gz benchmesh/
          cd ..

      - name: Create checksums
        run: |
          cd dist-web
          sha256sum benchmesh-web-${{ needs.get-version.outputs.version }}.tar.gz > checksums.txt

      - name: Upload self-hosted assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            ./dist-web/benchmesh-web-${{ needs.get-version.outputs.version }}.tar.gz \
            ./dist-web/checksums.txt#checksums-web.txt
