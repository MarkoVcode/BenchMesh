name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read  # Required to checkout code

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (service)
        working-directory: benchmesh-serial-service
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest

      - name: Run backend tests
        run: |
          python -m pytest -q benchmesh-serial-service/tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: benchmesh-serial-service/frontend/package.json

      - name: Install frontend dependencies
        working-directory: benchmesh-serial-service/frontend
        run: |
          npm ci

      - name: Run frontend unit tests
        working-directory: benchmesh-serial-service/frontend
        run: |
          npx vitest run --reporter=dot
